services:
  - type: web
    name: credit-card-approval
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt && python train.py"
    startCommand: "gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "False"
